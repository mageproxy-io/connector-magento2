name: Magento 2 Integration Tests

on:
  push:
    branches: [ main, develop ]

permissions:
  contents: read

concurrency:
  group: m2-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: M2 Integration (PHP ${{ matrix.php }}, M${{ matrix.magento }})
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.2' ]
        magento: [ '2.4.7' ]
    uses: extdn/github-actions-m2/.github/workflows/magento-integration-tests.yml@main
    with:
      php: ${{ matrix.php }}
      magento: ${{ matrix.magento }}
      # Use Mage-OS mirrors to avoid requiring repo.magento.com credentials
      use-mirror: true
      # Explicitly restrict tests to this repository's module
      module-path: '.'

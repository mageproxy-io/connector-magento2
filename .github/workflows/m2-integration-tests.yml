name: Magento 2 Integration Tests

on:
  push:
    branches: [ main, develop ]

permissions:
  contents: read

concurrency:
  group: m2-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: M2 Integration (PHP ${{ matrix.php }}, M${{ matrix.magento }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.2' ]
        magento: [ '2.4.7' ]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: magento
          MYSQL_USER: magento
          MYSQL_PASSWORD: magento
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -proot || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      opensearch:
        image: opensearchproject/opensearch:2.11.1
        env:
          discovery.type: single-node
          plugins.security.disabled: 'true'
          OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
        ports:
          - 9200:9200
          - 9600:9600
        options: >-
          --health-cmd="curl --silent --fail http://localhost:9200/_cluster/health || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          extensions: bcmath, ctype, curl, dom, fileinfo, gd, hash, iconv, intl, mbstring, openssl, pcntl, pdo_mysql, simplexml, soap, sockets, sodium, tokenizer, xsl, zip
          ini-values: memory_limit=-1, opcache.enable=1, opcache.enable_cli=1
          tools: composer:v2

      - name: Composer cache
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Create Magento project (Mage-OS mirror)
        run: |
          composer create-project --repository-url=https://mirror.mage-os.org/ mage-os/project-community-edition:${{ matrix.magento }} magento --no-interaction --no-progress

      - name: Link this module via path repository
        working-directory: magento
        run: |
          composer config repositories.mageproxy_connector path ../
          composer require mageproxy/connector-magento2:* --no-interaction --no-progress

      - name: Prepare integration test config
        working-directory: magento
        run: |
          mkdir -p dev/tests/integration/etc
          cat > dev/tests/integration/etc/install-config-mysql.php <<'PHP'
          <?php
          return [
              'db' => [
                  'table_prefix' => '',
                  'connection' => [
                      'default' => [
                          'host' => '127.0.0.1',
                          'dbname' => 'magento',
                          'username' => 'magento',
                          'password' => 'magento',
                          'model' => 'mysql4',
                          'engine' => 'innodb',
                          'initStatements' => 'SET NAMES utf8;',
                          'active' => '1',
                      ],
                  ],
              ],
              'resource' => [
                  'default_setup' => [
                      'connection' => 'default',
                  ],
              ],
              'elasticsearch' => [
                  'enabled' => '1',
                  'server_hostname' => '127.0.0.1',
                  'server_port' => '9200',
                  'index_prefix' => 'm2it',
                  'timeout' => 15,
                  'enable_auth' => '0',
                  'username' => '',
                  'password' => '',
              ],
          ];
          PHP

      - name: Wait for services
        run: |
          echo "Waiting for MySQL and OpenSearch..."
          for i in {1..30}; do
            (echo > /dev/tcp/127.0.0.1/3306) >/dev/null 2>&1 && curl -sSf http://127.0.0.1:9200 >/dev/null 2>&1 && break
            sleep 3
          done

      - name: Run module integration tests
        working-directory: magento
        env:
          TESTS_CLEANUP: enabled
          COMPOSER_DISABLE_NETWORK: 0
        run: |
          php -d memory_limit=-1 vendor/bin/phpunit -c dev/tests/integration/phpunit.xml.dist vendor/mageproxy/connector-magento2/Test/Integration
